<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <meta name="keywords" content="HTML, CSS">
  <meta name="description" content="frontendmentor">
  <meta name="author" content="Ana Clarissi">

  <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon-32x32.png">

  <link rel="stylesheet" href="assets/css/style.css">
  
  <title>Frontend Mentor | Product preview card component</title>

</head>
<body>

  <main>
    <article class="card">

      <picture>

        <source media="(min-width: 1280px)" srcset="assets/images/image-product-desktop.jpg">
        
        <img class="card-img" src="assets/images/image-product-mobile.jpg" alt="Perfume">
      
      </picture>

      <div class="card-description">

        <p class="product-category">Perfume</p>

        <p class="product-name">Gabrielle Essence Eau De Parfum</p>
        
        <p class="product-description">
          A floral, solar and voluptuous interpretation composed by Olivier Polge,
          Perfumer-Creator for the House of CHANEL.
        </p>

        <div class="product-price">

          <p class="product-new-price">$149.99</p>

          <p class="product-old-price">$169.99</p>

        </div>

        <button class="cart-button"> <img src="assets/images/icon-cart.svg" alt=""> Add to Cart</button>

      </div>
    </article>
  </main>
  
</body>
</html>
